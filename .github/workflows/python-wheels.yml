name: Build Python Wheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  # =====================================================================
  # Stage 1 — Build the static libCAT.a on each macOS architecture
  #
  # Linux wheels are built entirely inside the manylinux container
  # (via CIBW_BEFORE_ALL) to avoid C++ ABI mismatches between the
  # host GCC and the container's libstdc++.
  # =====================================================================
  build-libcat-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            artifact: libcat-macos-arm64
          - os: macos-15-intel
            arch: x64
            artifact: libcat-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install autoconf automake libtool autoconf-archive

      - name: Configure
        # Pin deployment target to match the wheel build below so the
        # static .o files inside libCAT.a don't drag the final .so's
        # min-OS above the wheel's claimed 11.0 target.
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          autoupdate
          autoreconf -fi
          export {C,CXX,CPP}FLAGS="-O2 -fPIC -mmacosx-version-min=11.0"
          ./configure --enable-static --disable-shared --disable-doc

      - name: Build libCAT.a
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: make -j$(sysctl -n hw.ncpu) libCAT.la

      - name: Collect build artifacts
        run: |
          mkdir -p _staging
          cp .libs/libCAT.a                       _staging/
          cp config.h                             _staging/
          cp 3rdparty/fftw-build/.libs/libfftw3.a _staging/

      - name: Upload libCAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: _staging/
          retention-days: 1

  # =====================================================================
  # Stage 2a — macOS wheels (use pre-built libCAT.a via _vendor/)
  # =====================================================================
  build-wheels-macos:
    needs: build-libcat-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            libcat-artifact: libcat-macos-arm64
            cibw-archs: arm64
          - os: macos-15-intel
            libcat-artifact: libcat-macos-x86_64
            cibw-archs: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Download libCAT artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.libcat-artifact }}
          path: _libcat/

      - name: Stage _vendor tree
        run: |
          V=cat_surface_cython/_vendor
          mkdir -p "$V"

          # Headers
          cp -r Include "$V/Include"
          mkdir -p "$V/3rdparty"
          for d in bicpl-surface/Include volume_io/Include; do
            mkdir -p "$V/3rdparty/$d"
            cp -r "3rdparty/$d/"* "$V/3rdparty/$d/"
          done
          for d in nifti gifticlib nii2mesh zlib expat dartel; do
            mkdir -p "$V/3rdparty/$d"
            cp 3rdparty/$d/*.h "$V/3rdparty/$d/" 2>/dev/null || true
          done

          # Static archives + config.h.  libomp is intentionally NOT
          # staged here: the wheel links against Homebrew's dynamic
          # libomp.dylib (see setup.py) so cat_surf ends up with one
          # libomp instance in-process instead of one per .so.
          mkdir -p "$V/build/.libs" "$V/build/3rdparty/fftw-build/.libs"
          cp _libcat/libCAT.a   "$V/build/.libs/"
          cp _libcat/config.h   "$V/build/"
          cp _libcat/libfftw3.a "$V/build/3rdparty/fftw-build/.libs/"

      - name: Build libomp from source with wheel's deployment target
        # Homebrew's prebuilt libomp.dylib on the macos-15 runners ships
        # with a min-OS of 15.0, which delocate-wheel rejects when bundling
        # into a wheel whose own deployment target is 11.0 (the cibuildwheel
        # default for arm64).  Building libomp from source with
        # MACOSX_DEPLOYMENT_TARGET=11.0 produces a libomp.dylib that
        # matches the wheel's target so delocate can bundle it.
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          # Drop any pre-installed bottle first so brew actually rebuilds.
          brew uninstall --ignore-dependencies libomp 2>/dev/null || true
          brew install --build-from-source libomp

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.23.3

      - name: Build wheels
        working-directory: cat_surface_cython
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # Pin the wheel's deployment target to match the libomp we
          # built from source above.  Default for x86_64 is 10.9, which
          # would not match libomp built with MACOSX_DEPLOYMENT_TARGET=11.0
          # and delocate-wheel would reject the bundle.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.libcat-artifact }}
          path: cat_surface_cython/wheelhouse/*.whl

  # =====================================================================
  # Stage 2b — Linux wheels (build libCAT.a inside the manylinux container)
  #
  # cibuildwheel only mounts cat_surface_cython/ at /project inside the
  # Docker container — the rest of the repo is NOT available.  We bundle
  # the full source tree as a tarball so CIBW_BEFORE_ALL can extract it,
  # build libCAT.a with the container's own GCC/libstdc++ (avoiding C++
  # ABI mismatches), and stage the results into _vendor/.
  # =====================================================================
  build-wheels-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            cibw-archs: x86_64
            artifact-suffix: linux-x86_64
          - os: ubuntu-22.04-arm
            cibw-archs: aarch64
            artifact-suffix: linux-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # Bundle the source tree so it's available inside the container.
      - name: Create source tarball for container build
        run: |
          tar czf cat_surface_cython/_build_src.tar.gz \
            --exclude='./build-*' \
            --exclude='./cat_surface_cython' \
            --exclude='./deprecated' \
            --exclude='./docs' \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='*.o' --exclude='*.lo' \
            --exclude='.libs' \
            --exclude='autom4te.cache' \
            .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.23.3

      - name: Build wheels
        working-directory: cat_surface_cython
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # Build libCAT.a from source inside the manylinux container
          # so the C++ ABI (MeshFix) matches the container's libstdc++.
          CIBW_BEFORE_ALL_LINUX: |
            set -e
            yum install -y autoconf automake libtool autoconf-archive make gcc gcc-c++ expat-devel
            mkdir /tmp/cat-build && cd /tmp/cat-build
            tar xzf /project/_build_src.tar.gz
            autoupdate
            autoreconf -fi
            ./configure --enable-static --disable-shared --disable-doc \
              CFLAGS="-O2 -fPIC" CXXFLAGS="-O2 -fPIC" CPPFLAGS="-O2"
            make -j$(nproc) libCAT.la
            V=/project/_vendor
            mkdir -p "$V/build/.libs" "$V/build/3rdparty/fftw-build/.libs"
            cp .libs/libCAT.a         "$V/build/.libs/"
            cp config.h               "$V/build/"
            cp 3rdparty/fftw-build/.libs/libfftw3.a "$V/build/3rdparty/fftw-build/.libs/"
            cp -r Include             "$V/Include"
            mkdir -p "$V/3rdparty"
            for d in bicpl-surface/Include volume_io/Include; do
              mkdir -p "$V/3rdparty/$d"
              cp -r "3rdparty/$d/"* "$V/3rdparty/$d/"
            done
            for d in nifti gifticlib nii2mesh zlib expat dartel; do
              mkdir -p "$V/3rdparty/$d"
              cp 3rdparty/$d/*.h "$V/3rdparty/$d/" 2>/dev/null || true
            done
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-libcat-${{ matrix.artifact-suffix }}
          path: cat_surface_cython/wheelhouse/*.whl

  # =====================================================================
  # Stage 3 — Merge all wheel artifacts
  # =====================================================================
  merge-wheels:
    needs: [build-wheels-macos, build-wheels-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Upload combined wheels
        uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist/
          retention-days: 30
