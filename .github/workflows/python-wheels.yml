name: Build Python Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # =====================================================================
  # Stage 1 — Build the static libCAT.a on each macOS architecture
  #
  # Linux wheels are built entirely inside the manylinux container
  # (via CIBW_BEFORE_ALL) to avoid C++ ABI mismatches between the
  # host GCC and the container's libstdc++.
  # =====================================================================
  build-libcat-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            artifact: libcat-macos-arm64
          - os: macos-15-intel
            arch: x64
            artifact: libcat-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install autoconf automake libtool autoconf-archive

      - name: Configure
        run: |
          autoreconf -fi
          export {C,CXX,CPP}FLAGS="-O2 -fPIC"
          ./configure --enable-static --disable-shared --disable-doc

      - name: Build libCAT.a
        run: make -j$(sysctl -n hw.ncpu) libCAT.la

      - name: Collect build artifacts
        run: |
          mkdir -p _staging
          cp .libs/libCAT.a                       _staging/
          cp config.h                             _staging/
          cp 3rdparty/fftw-build/.libs/libfftw3.a _staging/

      - name: Upload libCAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: _staging/
          retention-days: 1

  # =====================================================================
  # Stage 2a — macOS wheels (use pre-built libCAT.a via _vendor/)
  # =====================================================================
  build-wheels-macos:
    needs: build-libcat-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            libcat-artifact: libcat-macos-arm64
            cibw-archs: arm64
          - os: macos-15-intel
            libcat-artifact: libcat-macos-x86_64
            cibw-archs: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Download libCAT artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.libcat-artifact }}
          path: _libcat/

      - name: Stage _vendor tree
        run: |
          V=cat_surface_cython/_vendor
          mkdir -p "$V"

          # Headers
          cp -r Include "$V/Include"
          mkdir -p "$V/3rdparty"
          for d in bicpl-surface/Include volume_io/Include; do
            mkdir -p "$V/3rdparty/$d"
            cp -r "3rdparty/$d/"* "$V/3rdparty/$d/"
          done
          for d in nifti gifticlib nii2mesh zlib expat dartel; do
            mkdir -p "$V/3rdparty/$d"
            cp 3rdparty/$d/*.h "$V/3rdparty/$d/" 2>/dev/null || true
          done

          # Bundled static libomp
          if [ -d 3rdparty/libomp/lib ]; then
            mkdir -p "$V/3rdparty/libomp/lib"
            cp 3rdparty/libomp/lib/*.a "$V/3rdparty/libomp/lib/"
          fi

          # Static archives + config.h
          mkdir -p "$V/build/.libs" "$V/build/3rdparty/fftw-build/.libs"
          cp _libcat/libCAT.a   "$V/build/.libs/"
          cp _libcat/config.h   "$V/build/"
          cp _libcat/libfftw3.a "$V/build/3rdparty/fftw-build/.libs/"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.23.3

      - name: Build wheels
        working-directory: cat_surface_cython
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.libcat-artifact }}
          path: cat_surface_cython/wheelhouse/*.whl

  # =====================================================================
  # Stage 2b — Linux wheels (build libCAT.a inside the manylinux container)
  #
  # cibuildwheel mounts the full repo at /project inside the Docker
  # container.  CIBW_BEFORE_ALL runs the autotools build once, then
  # stages the result into _vendor/ where setup.py finds it.
  # =====================================================================
  build-wheels-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            cibw-archs: x86_64
            artifact-suffix: linux-x86_64
          - os: ubuntu-22.04-arm
            cibw-archs: aarch64
            artifact-suffix: linux-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.23.3

      - name: Build wheels
        working-directory: cat_surface_cython
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # Build libCAT.a from source inside the manylinux container
          # so the C++ ABI (MeshFix) matches the container's libstdc++.
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y autoconf automake libtool make gcc gcc-c++ \
                           expat-devel 2>/dev/null || \
            apt-get update && apt-get install -y autoconf automake libtool \
                           make gcc g++ libexpat1-dev 2>/dev/null || true
            cd /project
            autoreconf -fi
            export CFLAGS="-O2 -fPIC" CXXFLAGS="-O2 -fPIC" CPPFLAGS="-O2"
            ./configure --enable-static --disable-shared --disable-doc
            make -j$(nproc) libCAT.la
            # Stage into _vendor/ for setup.py
            V=/project/cat_surface_cython/_vendor
            mkdir -p "$V/build/.libs" "$V/build/3rdparty/fftw-build/.libs"
            cp .libs/libCAT.a   "$V/build/.libs/"
            cp config.h         "$V/build/"
            cp 3rdparty/fftw-build/.libs/libfftw3.a "$V/build/3rdparty/fftw-build/.libs/"
            cp -r Include "$V/Include"
            mkdir -p "$V/3rdparty"
            for d in bicpl-surface/Include volume_io/Include; do
              mkdir -p "$V/3rdparty/$d"
              cp -r "3rdparty/$d/"* "$V/3rdparty/$d/"
            done
            for d in nifti gifticlib nii2mesh zlib expat dartel; do
              mkdir -p "$V/3rdparty/$d"
              cp 3rdparty/$d/*.h "$V/3rdparty/$d/" 2>/dev/null || true
            done
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-libcat-${{ matrix.artifact-suffix }}
          path: cat_surface_cython/wheelhouse/*.whl

  # =====================================================================
  # Stage 3 — Merge all wheel artifacts
  # =====================================================================
  merge-wheels:
    needs: [build-wheels-macos, build-wheels-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Upload combined wheels
        uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist/
          retention-days: 30
