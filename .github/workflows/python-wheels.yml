name: Build Python Wheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  # =====================================================================
  # Stage 1 — Build the static libCAT.a on each macOS architecture
  #
  # Linux wheels are built entirely inside the manylinux container
  # (via CIBW_BEFORE_ALL) to avoid C++ ABI mismatches between the
  # host GCC and the container's libstdc++.
  # =====================================================================
  build-libcat-macos:
    strategy:
      fail-fast: false
      matrix:
        # macOS x86_64 is intentionally dropped: torch's Intel wheel
        # does not bundle libomp.dylib (it ships libiomp5.dylib instead,
        # if anything), so cat_surf's @rpath/libomp.dylib resolution
        # fails at import time.  Apple Silicon is the supported target;
        # Intel Mac users can build from source.
        include:
          - os: macos-15
            arch: arm64
            artifact: libcat-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install autoconf automake libtool autoconf-archive

      - name: Configure
        # Pin deployment target to match the wheel build below so the
        # static .o files inside libCAT.a don't drag the final .so's
        # min-OS above the wheel's claimed 11.0 target.
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          autoupdate
          autoreconf -fi
          export {C,CXX,CPP}FLAGS="-O2 -fPIC -mmacosx-version-min=11.0"
          ./configure --enable-static --disable-shared --disable-doc

      - name: Build libCAT.a
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: make -j$(sysctl -n hw.ncpu) libCAT.la

      - name: Collect build artifacts
        run: |
          mkdir -p _staging
          cp .libs/libCAT.a                       _staging/
          cp config.h                             _staging/
          cp 3rdparty/fftw-build/.libs/libfftw3.a _staging/

      - name: Upload libCAT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: _staging/
          retention-days: 1

  # =====================================================================
  # Stage 2a — macOS wheels (use pre-built libCAT.a via _vendor/)
  # =====================================================================
  build-wheels-macos:
    needs: build-libcat-macos
    strategy:
      fail-fast: false
      matrix:
        # Apple Silicon only — see build-libcat-macos matrix comment.
        include:
          - os: macos-15
            libcat-artifact: libcat-macos-arm64
            cibw-archs: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Download libCAT artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.libcat-artifact }}
          path: _libcat/

      - name: Stage _vendor tree
        run: |
          V=cat_surface_cython/_vendor
          mkdir -p "$V"

          # Headers
          cp -r Include "$V/Include"
          mkdir -p "$V/3rdparty"
          for d in bicpl-surface/Include volume_io/Include; do
            mkdir -p "$V/3rdparty/$d"
            cp -r "3rdparty/$d/"* "$V/3rdparty/$d/"
          done
          for d in nifti gifticlib nii2mesh zlib expat dartel; do
            mkdir -p "$V/3rdparty/$d"
            cp 3rdparty/$d/*.h "$V/3rdparty/$d/" 2>/dev/null || true
          done

          # Static archives + config.h.  libomp is intentionally NOT
          # staged here: the wheel links against Homebrew's dynamic
          # libomp.dylib (see setup.py) so cat_surf ends up with one
          # libomp instance in-process instead of one per .so.
          mkdir -p "$V/build/.libs" "$V/build/3rdparty/fftw-build/.libs"
          cp _libcat/libCAT.a   "$V/build/.libs/"
          cp _libcat/config.h   "$V/build/"
          cp _libcat/libfftw3.a "$V/build/3rdparty/fftw-build/.libs/"

      - name: Build libomp from LLVM source with deployment target 11.0
        # Homebrew's libomp bottle on macos-15 ships with min-OS 15.0,
        # which delocate-wheel rejects when bundling into a wheel that
        # targets 11.0.  Homebrew's `--build-from-source` does NOT honor
        # MACOSX_DEPLOYMENT_TARGET (cmake fills in CMAKE_OSX_DEPLOYMENT_TARGET
        # from the runner's macOS version), so we bypass Homebrew and build
        # libomp directly from LLVM's openmp source with explicit cmake
        # flags.  Install location is consumed by setup.py via env var.
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          LIBOMP_VER: "20.1.5"
        run: |
          set -euxo pipefail
          # Remove any pre-installed Homebrew libomp so its headers and
          # dylib don't accidentally get picked up at link time.
          brew uninstall --ignore-dependencies libomp 2>/dev/null || true

          curl -fsSL -o openmp.tar.xz \
            "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LIBOMP_VER}/openmp-${LIBOMP_VER}.src.tar.xz"
          tar xf openmp.tar.xz

          # cmake-only required dep for the openmp standalone build is the
          # llvm-cmake module.  Recent LLVM releases ship cmake/ alongside.
          curl -fsSL -o cmake-mods.tar.xz \
            "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LIBOMP_VER}/cmake-${LIBOMP_VER}.src.tar.xz"
          tar xf cmake-mods.tar.xz
          mv cmake-${LIBOMP_VER}.src cmake

          cmake -S openmp-${LIBOMP_VER}.src -B build-omp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/libomp" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DLIBOMP_INSTALL_ALIASES=OFF \
            -DOPENMP_ENABLE_LIBOMPTARGET=OFF
          cmake --build build-omp -j"$(sysctl -n hw.ncpu)"
          cmake --install build-omp

          # Keep libomp's install name as @rpath/libomp.dylib so the
          # cat_surf .so files record the dep as @rpath/libomp.dylib too.
          # At runtime each .so searches its own rpath list (set in
          # setup.py) -- torch's libomp first, then Homebrew, then the
          # wheel's own .dylibs/ as a last-resort fallback.  This gives
          # us exactly ONE libomp.dylib per process even when PyTorch is
          # already loaded.
          install_name_tool -id \
            "@rpath/libomp.dylib" \
            "$HOME/libomp/lib/libomp.dylib"

          # Pass the prefix to setup.py so its libomp lookup picks our
          # build (instead of Homebrew's missing/uninstalled one).
          echo "CAT_LIBOMP_PREFIX=$HOME/libomp" >> "$GITHUB_ENV"

          # Verify the dylib has the expected min-OS marker and the
          # @rpath install name.
          otool -l "$HOME/libomp/lib/libomp.dylib" \
            | grep -E "minos|version|LC_BUILD|LC_ID_DYLIB" -A 1 | head -20
          otool -D "$HOME/libomp/lib/libomp.dylib"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.23.3

      - name: Build wheels
        working-directory: cat_surface_cython
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # Pin the wheel's deployment target to match the libomp we
          # built from source above.  Default for x86_64 is 10.9, which
          # would not match libomp built with MACOSX_DEPLOYMENT_TARGET=11.0
          # and delocate-wheel would reject the bundle.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          # CIBW_ENVIRONMENT_MACOS values are expanded by the build
          # subprocess shell, so $HOME refers to the runner's home dir
          # at wheel-build time -- which is the same prefix the libomp
          # step installed to above.  No GitHub Actions $GITHUB_ENV
          # plumbing required.
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=11.0
            CAT_LIBOMP_PREFIX=$HOME/libomp
          # Skip delocate entirely.  delocate's design is to bundle every
          # non-system dep into the wheel; with `--exclude libomp.dylib`
          # it still validates resolvability and fails the build when
          # the linker's libomp ($HOME/libomp, our from-source build) is
          # not reachable from any rpath baked into the .so.  We don't
          # WANT it bundled (multiple libomps in one process is the bug
          # we've been chasing), and we don't NEED build-time validation
          # because runtime dyld resolves @rpath/libomp.dylib against the
          # rpath list setup.py compiled in (torch first, then Homebrew).
          # A bare `cp` keeps cibuildwheel's repair contract satisfied.
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "cp {wheel} {dest_dir}"
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.libcat-artifact }}
          path: cat_surface_cython/wheelhouse/*.whl

  # =====================================================================
  # Stage 2b — Linux wheels (build libCAT.a inside the manylinux container)
  #
  # cibuildwheel only mounts cat_surface_cython/ at /project inside the
  # Docker container — the rest of the repo is NOT available.  We bundle
  # the full source tree as a tarball so CIBW_BEFORE_ALL can extract it,
  # build libCAT.a with the container's own GCC/libstdc++ (avoiding C++
  # ABI mismatches), and stage the results into _vendor/.
  # =====================================================================
  build-wheels-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            cibw-archs: x86_64
            artifact-suffix: linux-x86_64
          - os: ubuntu-22.04-arm
            cibw-archs: aarch64
            artifact-suffix: linux-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # Bundle the source tree so it's available inside the container.
      - name: Create source tarball for container build
        run: |
          tar czf cat_surface_cython/_build_src.tar.gz \
            --exclude='./build-*' \
            --exclude='./cat_surface_cython' \
            --exclude='./deprecated' \
            --exclude='./docs' \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='*.o' --exclude='*.lo' \
            --exclude='.libs' \
            --exclude='autom4te.cache' \
            .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.23.3

      - name: Build wheels
        working-directory: cat_surface_cython
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # Build libCAT.a from source inside the manylinux container
          # so the C++ ABI (MeshFix) matches the container's libstdc++.
          CIBW_BEFORE_ALL_LINUX: |
            set -e
            yum install -y autoconf automake libtool autoconf-archive make gcc gcc-c++ expat-devel
            mkdir /tmp/cat-build && cd /tmp/cat-build
            tar xzf /project/_build_src.tar.gz
            autoupdate
            autoreconf -fi
            ./configure --enable-static --disable-shared --disable-doc \
              CFLAGS="-O2 -fPIC" CXXFLAGS="-O2 -fPIC" CPPFLAGS="-O2"
            make -j$(nproc) libCAT.la
            V=/project/_vendor
            mkdir -p "$V/build/.libs" "$V/build/3rdparty/fftw-build/.libs"
            cp .libs/libCAT.a         "$V/build/.libs/"
            cp config.h               "$V/build/"
            cp 3rdparty/fftw-build/.libs/libfftw3.a "$V/build/3rdparty/fftw-build/.libs/"
            cp -r Include             "$V/Include"
            mkdir -p "$V/3rdparty"
            for d in bicpl-surface/Include volume_io/Include; do
              mkdir -p "$V/3rdparty/$d"
              cp -r "3rdparty/$d/"* "$V/3rdparty/$d/"
            done
            for d in nifti gifticlib nii2mesh zlib expat dartel; do
              mkdir -p "$V/3rdparty/$d"
              cp 3rdparty/$d/*.h "$V/3rdparty/$d/" 2>/dev/null || true
            done
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-libcat-${{ matrix.artifact-suffix }}
          path: cat_surface_cython/wheelhouse/*.whl

  # =====================================================================
  # Stage 3 — Merge all wheel artifacts
  # =====================================================================
  merge-wheels:
    needs: [build-wheels-macos, build-wheels-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Upload combined wheels
        uses: actions/upload-artifact@v4
        with:
          name: all-wheels
          path: dist/
          retention-days: 30
