name: Build Binaries

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            artifact: cat-surface-macos-arm64
          - os: macos-15-intel
            arch: x64
            artifact: cat-surface-macos-x86
          - os: ubuntu-22.04
            arch: x64
            artifact: cat-surface-ubuntu-x86_64
          - os: ubuntu-22.04-arm
            arch: arm64
            artifact: cat-surface-ubuntu-arm64
          - os: windows-latest
            arch: x64
            artifact: cat-surface-windows-x86

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # ---------------- Windows ----------------
      - name: Set up MSYS2
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >
            autoconf automake libtool autoconf-archive make zip
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-expat

      # ---------------- Ubuntu ----------------
      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool autoconf-archive build-essential \
            pkg-config zip

      # ---------------- macOS ----------------
      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install autoconf automake libtool autoconf-archive

      # ---------------- Configure ----------------
      - name: Configure (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          autoupdate
          autoreconf -fi
          export {C,CXX,CPP}FLAGS="-O2"
          ./configure --enable-static --disable-shared --disable-doc

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          autoupdate
          autoreconf -fi
          export {C,CXX,CPP}FLAGS="-O2 -I/mingw64/include"
          export LDFLAGS="-L/mingw64/lib -static-libgcc -static-libstdc++"
          ./configure --enable-static --disable-shared --disable-doc

      # ---------------- Build ----------------
      - name: Build
        if: matrix.os != 'windows-latest'
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: make -j$(nproc)

      # ---------------- Verify binaries ----------------
      - name: Verify binaries (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-22.04')
        run: |
          set -euo pipefail

          mapfile -t bins < <(find Progs -maxdepth 1 -type f -executable -name 'CAT_*' ! -name '*_ui' | sort)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "No CAT binaries found in Progs/."
            exit 1
          fi

          for bin in "${bins[@]}"; do
            echo "Checking ${bin}"

            set +e
            timeout 5s "$bin" --help >/dev/null 2>&1
            rc=$?
            set -e

            if [ "$rc" -eq 126 ] || [ "$rc" -eq 127 ]; then
              echo "Execution failed for ${bin} (exit code ${rc})."
              exit 1
            fi

            deps="$(ldd "$bin" 2>&1 || true)"
            echo "$deps"

            if echo "$deps" | grep -qi "not found"; then
              echo "Missing runtime dependency detected in ${bin}."
              exit 1
            fi

            if echo "$deps" | grep -qiE 'fftw|gomp'; then
              echo "Forbidden dynamic dependency detected in ${bin}."
              exit 1
            fi
          done

      - name: Verify binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          set -euo pipefail

          mapfile -t bins < <(find Progs -maxdepth 1 -type f -name 'CAT_*.exe' | sort)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "No CAT executables found in Progs/."
            exit 1
          fi

          for bin in "${bins[@]}"; do
            echo "Checking ${bin}"

            set +e
            "$bin" --help >/dev/null 2>&1
            rc=$?
            set -e

            if [ "$rc" -eq 126 ] || [ "$rc" -eq 127 ]; then
              echo "Execution failed for ${bin} (exit code ${rc})."
              exit 1
            fi

            deps="$(objdump -p "$bin" | sed -n 's/^[[:space:]]*DLL Name: //p' | tr '[:upper:]' '[:lower:]')"
            echo "$deps"

            if echo "$deps" | grep -qE 'fftw|gomp'; then
              echo "Forbidden dynamic dependency detected in ${bin}."
              exit 1
            fi
          done

      # ---------------- Package ----------------
      - name: Package binaries
        if: matrix.os != 'windows-latest'
        run: zip -r ${{ matrix.artifact }}.zip Progs

      - name: Package binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: zip -r ${{ matrix.artifact }}.zip Progs

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
